name: Publish macOS Android Preview

on:
  workflow_dispatch:
    inputs:
      android_run_id:
        description: Successful Build Android run ID
        required: true
        type: string
      macos_x64_run_id:
        description: Successful Build macOS x64 run ID
        required: true
        type: string
      macos_arm64_run_id:
        description: Successful Build macOS arm64 run ID
        required: true
        type: string
      xcframework_run_id:
        description: Successful Package macOS XCFramework run ID
        required: true
        type: string
      builder_commit:
        description: Full commit SHA used for preview tag provenance and release target
        required: true
        type: string
      preview_revision:
        description: Positive preview revision for this UTC release date
        required: true
        default: "1"
        type: string
      android_smoke_evidence_json:
        description: JSON emitted by tools/android-aar-smoke.sh
        required: true
        type: string
      macos_probe_evidence_json:
        description: JSON emitted by probing the exact macOS arm64 package
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: publish-macos-android-preview
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_DIR: ${{ github.workspace }}/release
      DIAGNOSTICS_DIR: ${{ github.workspace }}/diagnostics
      ANDROID_SMOKE_EVIDENCE_JSON: ${{ inputs.android_smoke_evidence_json }}
      MACOS_PROBE_EVIDENCE_JSON: ${{ inputs.macos_probe_evidence_json }}
    steps:
      - name: Check out builder
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Download Android package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: webrtc-m150-android-arm64-v8a
          path: inputs/android
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.android_run_id }}

      - name: Download macOS x64 package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: webrtc-m150-macos-x64
          path: inputs/macos-x64
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.macos_x64_run_id }}

      - name: Download macOS arm64 package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: webrtc-m150-macos-arm64
          path: inputs/macos-arm64
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.macos_arm64_run_id }}

      - name: Download macOS XCFramework package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: WebRTC-m150-macos-universal-xcframework
          path: inputs/xcframework
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.xcframework_run_id }}

      - name: Validate packages and runtime evidence
        id: manifest
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RELEASE_DIR" "$DIAGNOSTICS_DIR/evidence"
          printf '%s\n' "$ANDROID_SMOKE_EVIDENCE_JSON" > \
            "$DIAGNOSTICS_DIR/evidence/android-smoke.json"
          printf '%s\n' "$MACOS_PROBE_EVIDENCE_JSON" > \
            "$DIAGNOSTICS_DIR/evidence/macos-probe.json"
          RELEASE_DATE="$(date -u +%Y%m%d)"
          ANDROID_ARTIFACT_DIGEST="$(
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/${{ inputs.android_run_id }}/artifacts" |
              jq -r --arg name "webrtc-m150-android-arm64-v8a" \
                '[.artifacts[] | select(.name == $name and .expired == false)] |
                 if length == 1 then .[0].digest else error("Android artifact must be unique") end'
          )"
          python3 -u -m builder preview-release-manifest \
            --android-package inputs/android/webrtc-m150-android-arm64-v8a.tar.gz \
            --android-aar inputs/android/webrtc-m150-android-arm64-v8a.aar \
            --macos-x64-package inputs/macos-x64/webrtc-m150-macos-x64.tar.gz \
            --macos-arm64-package inputs/macos-arm64/webrtc-m150-macos-arm64.tar.gz \
            --xcframework inputs/xcframework/WebRTC-m150-macos-universal.xcframework.zip \
            --xcframework-metadata inputs/xcframework/xcframework-metadata.json \
            --android-smoke-evidence "$DIAGNOSTICS_DIR/evidence/android-smoke.json" \
            --macos-probe-evidence "$DIAGNOSTICS_DIR/evidence/macos-probe.json" \
            --output-dir "$RELEASE_DIR" \
            --builder-commit "${{ inputs.builder_commit }}" \
            --android-workflow-run-id "${{ inputs.android_run_id }}" \
            --android-artifact-digest "$ANDROID_ARTIFACT_DIGEST" \
            --release-date "$RELEASE_DATE" \
            --preview-revision "${{ inputs.preview_revision }}" \
            2>&1 | tee "$DIAGNOSTICS_DIR/preview-validation.log"
          TAG="$(jq -r .tag "$RELEASE_DIR/release-manifest.json")"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists" >&2
            exit 1
          fi

      - name: Publish scoped prerelease
        id: publish
        if: steps.manifest.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.manifest.outputs.tag }}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "${{ inputs.builder_commit }}" \
            --draft \
            --prerelease \
            --title "$TAG" \
            --notes "Scoped macOS + Android M150 preview. Android AAR was built by GitHub Actions and passed the local API 31 arm64 E2E smoke. The final XCFramework passed the local Apple Silicon VideoToolbox probe; macOS x64 has hosted static validation only." \
            inputs/android/webrtc-m150-android-arm64-v8a.tar.gz \
            inputs/android/webrtc-m150-android-arm64-v8a.aar \
            inputs/macos-x64/webrtc-m150-macos-x64.tar.gz \
            inputs/macos-arm64/webrtc-m150-macos-arm64.tar.gz \
            inputs/xcframework/WebRTC-m150-macos-universal.xcframework.zip \
            "$RELEASE_DIR/release-manifest.json" \
            "$RELEASE_DIR/SHA256SUMS"
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false

      - name: Verify published assets
        id: verify
        if: steps.publish.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$DIAGNOSTICS_DIR/published-assets"
          gh release download "${{ steps.manifest.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$DIAGNOSTICS_DIR/published-assets"
          cd "$DIAGNOSTICS_DIR/published-assets"
          shasum -a 256 -c SHA256SUMS

      - name: Record diagnostics
        if: always()
        shell: bash
        run: |
          set +e
          find inputs "$RELEASE_DIR" -maxdepth 3 -type f -print -exec shasum -a 256 {} \; \
            > "$DIAGNOSTICS_DIR/input-files.txt" 2>&1
          {
            echo "## Publish macOS Android Preview"
            echo
            echo "- Manifest validation: \`${{ steps.manifest.outcome }}\`"
            echo "- Publish: \`${{ steps.publish.outcome }}\`"
            echo "- Published asset verification: \`${{ steps.verify.outcome }}\`"
            echo "- Tag: \`${{ steps.manifest.outputs.tag }}\`"
            echo "- Release tag provenance commit: \`${{ inputs.builder_commit }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: webrtc-m150-macos-android-preview-diagnostics
          path: |
            ${{ env.DIAGNOSTICS_DIR }}
            ${{ env.RELEASE_DIR }}
          if-no-files-found: warn
          retention-days: 30

      - name: Propagate validation failure
        if: steps.manifest.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Propagate publish failure
        if: steps.manifest.outcome == 'success' && steps.publish.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Propagate published verification failure
        if: steps.publish.outcome == 'success' && steps.verify.outcome == 'failure'
        shell: bash
        run: exit 1
