name: Build Android

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-android
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    env:
      WORK_DIR: ${{ github.workspace }}/build-workspace
      DIST_DIR: ${{ github.workspace }}/dist
      DIAGNOSTICS_DIR: ${{ github.workspace }}/diagnostics
      ANDROID_ARTIFACT_DIR: ${{ github.workspace }}/android-artifact
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out builder
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Set up Java 11
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "11"

      - name: Verify snapshot tooling
        shell: bash
        run: zstd --version

      - name: Reclaim runner disk
        shell: bash
        run: |
          set -euxo pipefail
          df -h
          # Keep the runner-provided Android SDK: the AAR consumer smoke needs
          # its preinstalled, licensed API 36 platform and build tools.
          sudo rm -rf /usr/local/.ghcup /usr/share/swift /usr/share/dotnet
          df -h

      - name: Record runner state
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$DIST_DIR" "$DIAGNOSTICS_DIR"
          {
            date -u
            uname -a
            echo "RUNNER_OS=$RUNNER_OS"
            echo "RUNNER_ARCH=$RUNNER_ARCH"
            echo "ImageOS=${ImageOS:-unknown}"
            echo "ImageVersion=${ImageVersion:-unknown}"
            python3 --version
            git --version
            df -h
          } | tee "$DIAGNOSTICS_DIR/runner-before.txt"

      - name: Run unit tests
        shell: bash
        run: python3 -m unittest discover -s tests -v

      - name: Build and package android
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 -u -m builder build \
            --target android \
            --work-dir "$WORK_DIR" \
            --dist-dir "$DIST_DIR" \
            --builder-commit "$GITHUB_SHA" \
            2>&1 | tee "$DIAGNOSTICS_DIR/build.log"

      # AGP runs on JDK 17, while the AAR and consumer source contract remains
      # Java 8 bytecode (classfile major 52).
      - name: Set up JDK 17 for Java 8 AAR consumer
        if: steps.build.outcome == 'success'
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Compile AAR-only consumer APK
        id: consumer
        if: steps.build.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          set -euxo pipefail
          mkdir -p smoke/android-aar/app/libs
          cp \
            "$DIST_DIR/webrtc-m150-android-arm64-v8a.aar" \
            smoke/android-aar/app/libs/webrtc-m150-android-arm64-v8a.aar
          smoke/android-aar/gradlew \
            --no-daemon \
            --project-dir smoke/android-aar \
            :app:assembleDebug \
            2>&1 | tee "$DIAGNOSTICS_DIR/android-aar-consumer-build.log"
          APK="smoke/android-aar/app/build/outputs/apk/debug/app-debug.apk"
          unzip -Z1 "$APK" | grep -Fx \
            "lib/arm64-v8a/libjingle_peerconnection_so.so"
          rm -rf "$ANDROID_ARTIFACT_DIR"
          mkdir -p "$ANDROID_ARTIFACT_DIR"
          cp "$DIST_DIR/webrtc-m150-android-arm64-v8a.tar.gz" \
            "$ANDROID_ARTIFACT_DIR/"
          cp "$DIST_DIR/webrtc-m150-android-arm64-v8a.aar" \
            "$ANDROID_ARTIFACT_DIR/"
          cp "$APK" "$ANDROID_ARTIFACT_DIR/"
          shasum -a 256 \
            "$DIST_DIR/webrtc-m150-android-arm64-v8a.tar.gz" \
            "$DIST_DIR/webrtc-m150-android-arm64-v8a.aar" \
            "$APK" > "$DIAGNOSTICS_DIR/android-artifact-sha256.txt"
          cp "$DIAGNOSTICS_DIR/android-artifact-sha256.txt" \
            "$ANDROID_ARTIFACT_DIR/"

      - name: Upload binary package
        if: steps.build.outcome == 'success' && steps.consumer.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: webrtc-m150-android-arm64-v8a
          path: |
            ${{ env.ANDROID_ARTIFACT_DIR }}/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Collect diagnostics
        if: always()
        shell: bash
        run: |
          set +e
          {
            date -u
            df -h
            du -sh "$WORK_DIR" "$DIST_DIR" 2>/dev/null
          } > "$DIAGNOSTICS_DIR/runner-after.txt"
          find "$WORK_DIR/snapshot-cache" -maxdepth 1 -type f -print \
            > "$DIAGNOSTICS_DIR/snapshot-cache-files.txt" 2>/dev/null
          cp "$WORK_DIR"/snapshot-cache/*.manifest.json "$DIAGNOSTICS_DIR/" 2>/dev/null
          while IFS= read -r args_file; do
            relative="${args_file#"$WORK_DIR/out/"}"
            safe_name="${relative//\//-}"
            cp "$args_file" "$DIAGNOSTICS_DIR/gn-args-$safe_name"
          done < <(find "$WORK_DIR/out" -name gn-args.txt -type f -print 2>/dev/null)
          shasum -a 256 patches/m150/*.patch > "$DIAGNOSTICS_DIR/patch-hashes.txt" 2>/dev/null
          find "$WORK_DIR/out" -type f -print > "$DIAGNOSTICS_DIR/output-files.txt" 2>/dev/null
          {
            echo "## Build Android"
            echo
            echo "- Target: \`android\`"
            echo "- Builder commit: \`$GITHUB_SHA\`"
            echo "- Build outcome: \`${{ steps.build.outcome }}\`"
            echo "- AAR consumer outcome: \`${{ steps.consumer.outcome }}\`"
            echo "- Diagnostics artifact: \`webrtc-m150-android-arm64-v8a-diagnostics\`"
            if [ -f "$WORK_DIR/diagnostics/build-events.jsonl" ]; then
              echo
              echo "### Phase journal"
              echo '~~~json'
              tail -n 30 "$WORK_DIR/diagnostics/build-events.jsonl"
              echo '~~~'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: webrtc-m150-android-arm64-v8a-diagnostics
          path: |
            ${{ env.DIAGNOSTICS_DIR }}
            ${{ env.WORK_DIR }}/diagnostics
          if-no-files-found: warn
          retention-days: 30

      - name: Propagate build failure
        if: steps.build.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Propagate AAR consumer failure
        if: steps.build.outcome == 'success' && steps.consumer.outcome == 'failure'
        shell: bash
        run: exit 1
