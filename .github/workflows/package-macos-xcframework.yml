name: Package macOS XCFramework

on:
  workflow_dispatch:
    inputs:
      x64_run_id:
        description: Successful Build macOS x64 run ID
        required: true
        type: string
      arm64_run_id:
        description: Successful Build macOS arm64 run ID
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: package-macos-xcframework
  cancel-in-progress: false

jobs:
  package:
    runs-on: macos-26
    timeout-minutes: 60
    env:
      WORK_DIR: ${{ github.workspace }}/build-workspace-xcframework
      DIST_DIR: ${{ github.workspace }}/dist
      DIAGNOSTICS_DIR: ${{ github.workspace }}/diagnostics
    steps:
      - name: Check out builder
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Select Xcode 26.0.1
        shell: bash
        run: sudo xcode-select --switch /Applications/Xcode_26.0.app/Contents/Developer

      - name: Download x64 package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: webrtc-m150-macos-x64
          path: inputs/x64
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.x64_run_id }}

      - name: Download arm64 package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: webrtc-m150-macos-arm64
          path: inputs/arm64
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.arm64_run_id }}

      - name: Run unit tests
        shell: bash
        run: python3 -m unittest discover -s tests -v

      - name: Compose XCFramework
        id: compose
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p "$DIST_DIR" "$DIAGNOSTICS_DIR"
          set -o pipefail
          python3 -u -m builder merge-macos \
            --x64-package inputs/x64/webrtc-m150-macos-x64.tar.gz \
            --arm64-package inputs/arm64/webrtc-m150-macos-arm64.tar.gz \
            --work-dir "$WORK_DIR" \
            --dist-dir "$DIST_DIR" \
            2>&1 | tee "$DIAGNOSTICS_DIR/compose.log"

      - name: Upload XCFramework package
        if: steps.compose.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: WebRTC-m150-macos-universal-xcframework
          path: |
            ${{ env.DIST_DIR }}/WebRTC-m150-macos-universal.xcframework.zip
            ${{ env.DIST_DIR }}/xcframework-metadata.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Collect composition diagnostics
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p "$DIAGNOSTICS_DIR"
          df -h > "$DIAGNOSTICS_DIR/disk.txt"
          find "$DIST_DIR" -maxdepth 3 -print > "$DIAGNOSTICS_DIR/output-files.txt" 2>/dev/null
          {
            echo "## Package macOS XCFramework"
            echo
            echo "- x64 run: \`${{ inputs.x64_run_id }}\`"
            echo "- arm64 run: \`${{ inputs.arm64_run_id }}\`"
            echo "- Outcome: \`${{ steps.compose.outcome }}\`"
            echo "- Diagnostics artifact: \`WebRTC-m150-macos-universal-xcframework-diagnostics\`"
            if [ -f "$WORK_DIR/diagnostics/build-events.jsonl" ]; then
              echo
              echo "### Phase journal"
              echo '~~~json'
              cat "$WORK_DIR/diagnostics/build-events.jsonl"
              echo '~~~'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload composition diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: WebRTC-m150-macos-universal-xcframework-diagnostics
          path: |
            ${{ env.DIAGNOSTICS_DIR }}
            ${{ env.WORK_DIR }}/diagnostics
          if-no-files-found: warn
          retention-days: 30

      - name: Propagate composition failure
        if: steps.compose.outcome == 'failure'
        shell: bash
        run: exit 1
